<!DOCTYPE html>
<html class="scroll-smooth" lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Community | Blossom Bae</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-background": "#1a1c19",
                        "surface-variant": "#e3e3de",
                        "primary": "#293e2f",
                        "primary-container": "#3f5545",
                        "secondary": "#9f402d",
                        "on-surface": "#1a1c19",
                        "on-surface-variant": "#42493e",
                        "surface-container-low": "#f4f4ef",
                        "surface-container-lowest": "#ffffff",
                        "surface-container": "#eeeee9"
                    },
                    "fontFamily": {
                        "headline": ["Noto Serif"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>

<body class="bg-background text-on-surface font-body leading-relaxed flex flex-col min-h-screen">
    <app-header></app-header>
    
    <main class="flex-grow pt-32 pb-24 px-8 max-w-screen-2xl mx-auto w-full">
        <section class="flex flex-col lg:flex-row gap-16">
            <div class="lg:w-1/3 flex flex-col gap-2 py-6 bg-stone-50 dark:bg-stone-950 rounded-2xl overflow-hidden self-start sticky top-32">
                <div class="px-6 mb-4">
                    <h4 class="font-headline text-2xl text-green-900 font-bold">The Arboretum</h4>
                    <p class="text-stone-500 text-sm">Community Forum</p>
                </div>
                <button class="mx-6 px-4 py-3 mb-4 bg-primary text-on-primary rounded-full font-bold flex items-center justify-center gap-2 hover:opacity-90 active:scale-90 transition-all text-white">
                    <span class="material-symbols-outlined text-sm">add</span>
                    Start a Thread
                </button>
                <nav class="flex flex-col">
                    <a class="flex items-center gap-4 px-6 py-4 bg-green-100 dark:bg-green-900/30 text-green-900 dark:text-green-100 rounded-r-full font-bold transition-all" href="#">
                        <span class="material-symbols-outlined" data-icon="forum">forum</span>
                        <span class="font-body text-sm font-medium">All Discussions</span>
                    </a>
                    <a class="flex items-center gap-4 px-6 py-4 text-stone-500 dark:text-stone-400 hover:pl-8 hover:bg-stone-200/50 dark:hover:bg-stone-800/50 transition-all" href="#">
                        <span class="material-symbols-outlined" data-icon="psychiatry">psychiatry</span>
                        <span class="font-body text-sm font-medium">Plant ID</span>
                    </a>
                    <a class="flex items-center gap-4 px-6 py-4 text-stone-500 dark:text-stone-400 hover:pl-8 hover:bg-stone-200/50 dark:hover:bg-stone-800/50 transition-all" href="#">
                        <span class="material-symbols-outlined" data-icon="pest_control">pest_control</span>
                        <span class="font-body text-sm font-medium">Pest Control</span>
                    </a>
                    <a class="flex items-center gap-4 px-6 py-4 text-stone-500 dark:text-stone-400 hover:pl-8 hover:bg-stone-200/50 dark:hover:bg-stone-800/50 transition-all" href="#">
                        <span class="material-symbols-outlined" data-icon="local_library">local_library</span>
                        <span class="font-body text-sm font-medium">Care Guides</span>
                    </a>
                </nav>
            </div>
            
            <div class="lg:w-2/3">
                <div class="flex justify-between items-end mb-8 border-b border-outline-variant/30 pb-4">
                    <h1 class="text-4xl font-headline font-bold text-primary">Growing Together</h1>
                    <div class="flex gap-2 text-sm text-stone-500 font-bold uppercase tracking-widest">
                        <button class="hover:text-primary transition-colors text-primary">Recent</button>
                        <span>|</span>
                        <button class="hover:text-primary transition-colors">Popular</button>
                    </div>
                </div>

                <!-- Loading State -->
                <div id="loading" class="flex justify-center flex-col items-center py-12">
                     <span class="material-symbols-outlined animate-spin text-4xl text-primary mb-2">forum</span>
                     <span class="text-on-surface-variant font-medium">Loading discussions...</span>
                </div>

                <!-- Posts Container -->
                <div id="posts-container" class="space-y-6 hidden">
                    <!-- Dynamically populated by JS -->
                </div>
            </div>
        </section>
    </main>

    <app-footer></app-footer>

    <script src="js/components.js"></script>
    <script src="js/api.js"></script>
    <script src="js/community.js"></script>
</body>
</html>
